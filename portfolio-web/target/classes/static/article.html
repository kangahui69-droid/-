<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - TechForge</title>
    <style>
        /* ========== 配色系统 ========== */
        :root {
            --bg-primary: #f0f7ff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #06b6d4;
            --accent-dark: #0891b2;
            --border: #e5e5e5;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        /* ========== 导航 ========== */
        .navbar {
            position: sticky;
            top: 0;
            height: 60px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: nowrap;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); }

        /* ========== 主容器 ========== */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ========== 返回按钮 ========== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        /* ========== 文章头部 ========== */
        .article-header {
            margin-bottom: 32px;
        }

        .article-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ========== 文章内容 ========== */
        .article-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px var(--shadow);
            margin-bottom: 48px;
        }

        .article-content p {
            margin-bottom: 16px;
            font-size: 15px;
            line-height: 1.8;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            margin: 24px 0 12px;
            font-weight: 600;
        }

        .article-content h1 { font-size: 22px; }
        .article-content h2 { font-size: 18px; }
        .article-content h3 { font-size: 16px; }

        .article-content code {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .article-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .article-content pre code {
            background: transparent;
            padding: 0;
        }

        /* ========== 评论区 ========== */
        .comments-section {
            margin-top: 48px;
        }

        .comments-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .comment-form {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .comment-textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            margin-bottom: 12px;
        }

        .comment-textarea:focus {
            border-color: var(--accent);
        }

        .comment-submit-btn {
            padding: 10px 24px;
            border-radius: 8px;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .comment-submit-btn:hover {
            background: var(--accent-dark);
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .comment-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .comment-author {
            font-size: 14px;
            font-weight: 600;
        }

        .comment-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .comment-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* ========== 页脚 ========== */
        .footer {
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                gap: 8px;
            }
            .article-title {
                font-size: 22px;
            }
            .article-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">Tech<span>Forge</span></a>
        <div class="nav-links">
            <a class="nav-link" href="/articles.html">文章</a>
            <a class="nav-link" href="/#projects">项目</a>
            <a class="nav-link" href="/#skills">技能</a>
            <a class="nav-link" href="/#chat">AI 对话</a>
            <a class="nav-link" href="/#admin">后台</a>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container">
        <a href="/articles.html" class="back-link">← 返回文章列表</a>

        <article id="articleContainer">
            <div class="loading">加载中...</div>
        </article>

        <!-- 评论区 -->
        <section class="comments-section">
            <h2 class="comments-title">评论 (<span id="commentCount">0</span>)</h2>

            <!-- 评论表单 -->
            <div class="comment-form">
                <textarea id="commentText" class="comment-textarea" placeholder="发表你的评论..."></textarea>
                <button class="comment-submit-btn" onclick="submitComment()">提交评论</button>
            </div>

            <!-- 评论列表 -->
            <div class="comments-list" id="commentsList">
                <div class="empty-state">暂无评论，快来抢沙发吧</div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 TechForge · 用技术创造价值</p>
    </footer>

    <script>
        // 获取文章ID
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        // 加载文章详情
        async function loadArticle() {
            const container = document.getElementById('articleContainer');

            if (!articleId) {
                container.innerHTML = '<div class="empty-state">文章不存在</div>';
                return;
            }

            try {
                const res = await fetch(`/api/articles/${articleId}`);
                const data = await res.json();

                if (data.code === 200 && data.data) {
                    const article = data.data;
                    renderArticle(article);
                } else {
                    container.innerHTML = '<div class="empty-state">文章不存在</div>';
                }
            } catch (err) {
                console.error('加载文章失败:', err);
                container.innerHTML = '<div class="empty-state">加载失败，请刷新页面重试</div>';
            }
        }

        // 渲染文章
        function renderArticle(article) {
            const container = document.getElementById('articleContainer');
            const title = article.title || '';
            const content = article.content || '';
            const views = article.views || 0;
            const createdAt = formatDate(article.createdAt);

            // 简单处理Markdown内容
            const htmlContent = content
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/`(.*?)`/g, '<code>$1</code>');

            container.innerHTML = `
                <header class="article-header">
                    <h1 class="article-title">${title}</h1>
                    <div class="article-meta">
                        <span>📅 ${createdAt}</span>
                        <span>👁 ${views} 阅读</span>
                    </div>
                </header>
                <div class="article-content">
                    <p>${htmlContent}</p>
                </div>
            `;

            // 更新页面标题
            document.title = title + ' - TechForge';
        }

        // 提交评论
        async function submitComment() {
            const text = document.getElementById('commentText').value.trim();
            if (!text) {
                alert('请输入评论内容');
                return;
            }

            if (!articleId) {
                alert('文章不存在');
                return;
            }

            try {
                const res = await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articleId: parseInt(articleId),
                        content: text
                    })
                });

                const data = await res.json();
                if (data.code === 200) {
                    document.getElementById('commentText').value = '';
                    alert('评论成功！');
                    loadComments(); // 刷新评论列表
                } else {
                    alert(data.message || '评论失败');
                }
            } catch (err) {
                console.error('提交评论失败:', err);
                alert('评论失败，请稍后重试');
            }
        }

        // 加载评论列表
        async function loadComments() {
            if (!articleId) return;

            const listContainer = document.getElementById('commentsList');
            const countSpan = document.getElementById('commentCount');

            try {
                const res = await fetch(`/api/comments?articleId=${articleId}`);
                const data = await res.json();

                if (data.code === 200 && data.data) {
                    const comments = data.data.list || [];
                    const total = data.data.total || 0;

                    countSpan.textContent = total;

                    if (comments.length === 0) {
                        listContainer.innerHTML = '<div class="empty-state">暂无评论，快来抢沙发吧</div>';
                    } else {
                        listContainer.innerHTML = '';
                        comments.forEach(comment => {
                            const item = document.createElement('div');
                            item.className = 'comment-item';
                            item.innerHTML = `
                                <div class="comment-header">
                                    <span class="comment-author">${comment.author || '访客'}</span>
                                    <span class="comment-time">${formatDate(comment.createdAt)}</span>
                                </div>
                                <div class="comment-content">${comment.content}</div>
                            `;
                            listContainer.appendChild(item);
                        });
                    }
                }
            } catch (err) {
                console.error('加载评论失败:', err);
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 页面加载完成后加载文章和评论
        document.addEventListener('DOMContentLoaded', () => {
            loadArticle();
            loadComments();
        });
    </script>
</body>
</html>
