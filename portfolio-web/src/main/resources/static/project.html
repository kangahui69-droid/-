<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - TechForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b1120;
            --bg-card: #1a2332;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --border: #1e293b;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        .navbar {
            position: sticky;
            top: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: nowrap;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        /* ========== 封面区 ========== */
        .project-cover {
            position: relative;
            width: 100%;
            min-height: 240px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #1a3650 0%, #162540 40%, #1a2332 100%);
            display: flex;
            align-items: flex-end;
        }

        .project-cover.has-image {
            min-height: 320px;
        }

        .project-cover-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-cover-overlay {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 40px 32px 28px;
            background: linear-gradient(to top, rgba(11, 17, 32, 0.95) 0%, rgba(11, 17, 32, 0.4) 60%, transparent 100%);
        }

        .project-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .project-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            margin-bottom: 12px;
            backdrop-filter: blur(4px);
        }

        /* ========== 卡片网格 ========== */
        .project-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .project-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 24px 28px;
            border: 1px solid var(--border);
            transition: border-color 0.2s, transform 0.2s;
        }

        .project-card:hover {
            border-color: rgba(56, 189, 248, 0.25);
            transform: translateY(-1px);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .card-icon.desc   { background: rgba(56, 189, 248, 0.12); }
        .card-icon.feat   { background: rgba(167, 139, 250, 0.12); }
        .card-icon.struct { background: rgba(251, 191, 36, 0.12); }
        .card-icon.tech   { background: rgba(74, 222, 128, 0.12); }
        .card-icon.sum    { background: rgba(251, 146, 60, 0.12); }
        .card-icon.link   { background: rgba(248, 113, 113, 0.12); }

        .feature-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .feature-list li {
            font-size: 14px;
            color: var(--text-secondary);
            padding: 6px 10px 6px 28px;
            position: relative;
            line-height: 1.6;
        }

        .feature-list li::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 14px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.6;
        }

        .info-content {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-tag {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-weight: 500;
        }

        .skill-link {
            text-decoration: none;
            transition: all 0.3s;
        }

        .skill-link:hover {
            background: var(--accent);
            color: #0b1120;
        }

        .info-content code {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .info-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-content pre code {
            background: transparent;
            padding: 0;
        }

        .links-row {
            display: flex;
            gap: 16px;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            background: var(--accent);
            color: #fff;
            transition: all 0.2s;
        }

        .link-btn:hover {
            background: var(--accent-dark);
        }

        .link-btn.secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .link-btn.secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .empty-state, .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .footer {
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                gap: 8px;
            }
            .project-title {
                font-size: 22px;
            }
            .project-card {
                padding: 18px 16px;
            }
            .project-cover {
                min-height: 180px;
            }
            .project-cover.has-image {
                min-height: 240px;
            }
            .project-cover-overlay {
                padding: 24px 16px 20px;
            }
            .links-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">Tech<span>Forge</span></a>
        <div class="nav-links">
            <a class="nav-link" href="/">首页</a>
            <a class="nav-link" href="/articles.html">文章</a>
            <a class="nav-link" href="/projects.html">项目</a>
            <a class="nav-link" href="/#skills">技能</a>
            <a class="nav-link" href="/#chat">AI 对话</a>
            <a class="nav-link" href="/admin.html">后台</a>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container">
        <a href="/projects.html" class="back-link">← 返回项目列表</a>

        <article id="projectContainer">
            <div class="loading">加载中...</div>
        </article>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 TechForge · 用技术创造价值</p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        async function loadProject() {
            const container = document.getElementById('projectContainer');

            if (!projectId) {
                container.innerHTML = '<div class="empty-state">项目不存在</div>';
                return;
            }

            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const res = await fetch('/api/projects/' + projectId);
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    renderProject(data.data);
                } else {
                    container.innerHTML = '<div class="empty-state">项目不存在</div>';
                }
            } catch (err) {
                container.innerHTML = '<div class="empty-state">加载失败，请刷新页面重试</div>';
            }
        }

        function renderProject(project) {
            const container = document.getElementById('projectContainer');
            document.title = project.name + ' - TechForge';

            // 技术标签
            let techTags = '';
            if (project.skills && project.skills.length > 0) {
                techTags = project.skills.map(skill =>
                    `<a href="/skills.html" class="tech-tag skill-link" data-category="${skill.category || 'other'}">${skill.name}</a>`
                ).join('');
            } else if (project.techStack) {
                techTags = project.techStack.split(',').map(t => `<span class="tech-tag">${t.trim()}</span>`).join('');
            }

            // 封面区
            let coverHtml;
            if (project.coverImage) {
                coverHtml = `
                    <div class="project-cover has-image">
                        <img class="project-cover-img" src="${project.coverImage}" alt="${project.name}" onerror="this.parentElement.classList.remove('has-image')">
                        <div class="project-cover-overlay">
                            <h1 class="project-title">${project.name}</h1>
                            ${project.projectType ? `<span class="project-type">${project.projectType}</span>` : ''}
                        </div>
                    </div>`;
            } else {
                coverHtml = `
                    <div class="project-cover">
                        <div class="project-cover-overlay">
                            <h1 class="project-title">${project.name}</h1>
                            ${project.projectType ? `<span class="project-type">${project.projectType}</span>` : ''}
                        </div>
                    </div>`;
            }

            // 功能模块
            let featuresHtml = '';
            if (project.features) {
                let features;
                try {
                    features = typeof project.features === 'string' ? JSON.parse(project.features) : project.features;
                } catch (e) {
                    features = null;
                }
                if (Array.isArray(features) && features.length > 0) {
                    featuresHtml = `
                        <div class="project-card">
                            <h3 class="card-title">
                                <span class="card-icon feat">🧩</span>功能模块
                            </h3>
                            <ul class="feature-list">
                                ${features.map(f => `<li>${escapeHtml(typeof f === 'string' ? f : f.name)}</li>`).join('')}
                            </ul>
                        </div>`;
                }
            }

            // 项目结构
            let structureHtml = '';
            if (project.structure) {
                structureHtml = `
                    <div class="project-card">
                        <h3 class="card-title">
                            <span class="card-icon struct">📁</span>项目结构
                        </h3>
                        <pre class="info-content"><code>${escapeHtml(project.structure)}</code></pre>
                    </div>`;
            }

            // 项目总结
            let summaryHtml = '';
            if (project.summary) {
                summaryHtml = `
                    <div class="project-card">
                        <h3 class="card-title">
                            <span class="card-icon sum">💡</span>项目总结
                        </h3>
                        <p class="info-content">${project.summary}</p>
                    </div>`;
            }

            // 外部链接
            let linksHtml = '';
            if (project.githubUrl || project.demoUrl) {
                let btns = '';
                if (project.githubUrl) {
                    btns += `<a href="${project.githubUrl}" target="_blank" class="link-btn">GitHub</a>`;
                }
                if (project.demoUrl) {
                    btns += `<a href="${project.demoUrl}" target="_blank" class="link-btn secondary">在线演示</a>`;
                }
                linksHtml = `
                    <div class="project-card">
                        <h3 class="card-title">
                            <span class="card-icon link">🔗</span>相关链接
                        </h3>
                        <div class="links-row">${btns}</div>
                    </div>`;
            }

            container.innerHTML = `
                ${coverHtml}
                <div class="project-cards">
                    <div class="project-card">
                        <h3 class="card-title">
                            <span class="card-icon desc">📖</span>项目介绍
                        </h3>
                        <p class="info-content">${project.description || '暂无介绍'}</p>
                        ${techTags ? `<div class="tech-stack" style="margin-top:14px">${techTags}</div>` : ''}
                    </div>
                    ${featuresHtml}
                    ${structureHtml}
                    ${summaryHtml}
                    ${linksHtml}
                </div>
            `;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        document.addEventListener('DOMContentLoaded', loadProject);
    </script>
</body>
</html>
