<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - TechForge</title>
    <style>
        :root {
            --bg-primary: #f0f7ff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #06b6d4;
            --accent-dark: #0891b2;
            --border: #e5e5e5;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        .navbar {
            position: sticky;
            top: 0;
            height: 60px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: nowrap;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        .project-header {
            margin-bottom: 32px;
        }

        .project-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .project-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            background: var(--bg-card);
            color: var(--accent);
            margin-bottom: 16px;
        }

        .project-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px var(--shadow);
            margin-bottom: 32px;
        }

        .info-section {
            margin-bottom: 24px;
        }

        .info-section:last-child {
            margin-bottom: 0;
        }

        .info-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .info-content {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-tag {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .info-content code {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .info-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-content pre code {
            background: transparent;
            padding: 0;
        }

        .links-row {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            background: var(--accent);
            color: #fff;
            transition: all 0.2s;
        }

        .link-btn:hover {
            background: var(--accent-dark);
        }

        .link-btn.secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .link-btn.secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .empty-state, .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .footer {
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                gap: 8px;
            }
            .project-title {
                font-size: 22px;
            }
            .project-content {
                padding: 20px;
            }
            .links-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">Tech<span>Forge</span></a>
        <div class="nav-links">
            <a class="nav-link" href="/">首页</a>
            <a class="nav-link" href="/articles.html">文章</a>
            <a class="nav-link" href="/projects.html">项目</a>
            <a class="nav-link" href="/#skills">技能</a>
            <a class="nav-link" href="/#chat">AI 对话</a>
            <a class="nav-link" href="/admin.html">后台</a>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container">
        <a href="/projects.html" class="back-link">← 返回项目列表</a>

        <article id="projectContainer">
            <div class="loading">加载中...</div>
        </article>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 TechForge · 用技术创造价值</p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        async function loadProject() {
            const container = document.getElementById('projectContainer');

            if (!projectId) {
                container.innerHTML = '<p style="color:red">没有ID</p>';
                return;
            }

            container.innerHTML = '<p style="color:blue">正在加载 id=' + projectId + '...</p>';

            try {
                const res = await fetch('/api/projects/' + projectId);
                const data = await res.json();
                console.log('Got data:', data);

                if (data.code === 0 && data.data) {
                    renderProject(data.data);
                } else {
                    container.innerHTML = '<p style="color:red">找不到项目</p>';
                }
            } catch (err) {
                console.error('Error:', err);
                container.innerHTML = '<p style="color:red">错误: ' + err.message + '</p>';
            }
        }

        function renderProject(project) {
            const container = document.getElementById('projectContainer');
            document.title = project.name + ' - TechForge';

            const techTags = project.techStack
                ? project.techStack.split(',').map(t => `<span class="tech-tag">${t.trim()}</span>`).join('')
                : '';

            let featuresHtml = '';
            if (project.features) {
                try {
                    const features = typeof project.features === 'string' ? JSON.parse(project.features) : project.features;
                    if (Array.isArray(features)) {
                        featuresHtml = '<div class="info-section">' +
                            '<h3 class="info-title">功能模块</h3>' +
                            '<ul class="feature-list">' +
                            features.map(f => `<li>${typeof f === 'string' ? f : f.name}</li>`).join('') +
                            '</ul></div>';
                    }
                } catch (e) {
                    featuresHtml = '<div class="info-section"><h3 class="info-title">功能模块</h3><p class="info-content">' + project.features + '</p></div>';
                }
            }

            let structureHtml = '';
            if (project.structure) {
                structureHtml = '<div class="info-section">' +
                    '<h3 class="info-title">项目结构</h3>' +
                    '<pre class="info-content"><code>' + escapeHtml(project.structure) + '</code></pre>' +
                    '</div>';
            }

            let summaryHtml = '';
            if (project.summary) {
                summaryHtml = '<div class="info-section">' +
                    '<h3 class="info-title">项目总结</h3>' +
                    '<p class="info-content">' + project.summary + '</p>' +
                    '</div>';
            }

            let linksHtml = '';
            if (project.githubUrl) {
                linksHtml += `<a href="${project.githubUrl}" target="_blank" class="link-btn">GitHub</a>`;
            }
            if (project.demoUrl) {
                linksHtml += `<a href="${project.demoUrl}" target="_blank" class="link-btn secondary">在线演示</a>`;
            }

            container.innerHTML = `
                <header class="project-header">
                    <h1 class="project-title">${project.name}</h1>
                    ${project.projectType ? `<span class="project-type">${project.projectType}</span>` : ''}
                    <div class="tech-stack">${techTags}</div>
                </header>
                <div class="project-content">
                    <div class="info-section">
                        <h3 class="info-title">项目介绍</h3>
                        <p class="info-content">${project.description || '暂无介绍'}</p>
                    </div>
                    ${featuresHtml}
                    ${structureHtml}
                    ${project.techStack ? `
                    <div class="info-section">
                        <h3 class="info-title">技术栈</h3>
                        <div class="tech-stack">${techTags}</div>
                    </div>
                    ` : ''}
                    ${summaryHtml}
                    ${linksHtml ? `
                    <div class="links-row">${linksHtml}</div>
                    ` : ''}
                </div>
            `;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        document.addEventListener('DOMContentLoaded', loadProject);
    </script>
</body>
</html>
