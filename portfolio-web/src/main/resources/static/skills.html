<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术栈 - TechForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b1120;
            --bg-card: #1a2332;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --border: #1e293b;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        /* ========== 导航 ========== */
        .navbar {
            position: sticky;
            top: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links { display: flex; gap: 32px; flex-wrap: nowrap; }

        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); }

        /* ========== 主容器 ========== */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

        .page-header { margin-bottom: 32px; text-align: center; }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-title span { color: var(--accent); }

        /* ========== 技能分类 ========== */
        .skill-category { margin-bottom: 24px; }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--bg-card);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .category-header:hover {
            border-color: rgba(56, 189, 248, 0.3);
            background: rgba(26, 35, 50, 0.8);
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background: rgba(56, 189, 248, 0.1);
        }

        .category-title { font-size: 16px; font-weight: 600; flex: 1; }

        .category-toggle {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .category-header.expanded .category-toggle { transform: rotate(180deg); }

        /* ========== 技能网格 ========== */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.4s, margin 0.4s;
            margin-top: 0;
        }

        .skills-grid.show {
            max-height: 1000px;
            padding: 16px 20px;
            margin-top: 4px;
        }

        /* ========== 技能卡片 ========== */
        .skill-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .skill-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .skill-card.level-1::before, .skill-card.level-2::before { background: #4fc3f7; }
        .skill-card.level-3::before { background: #ffb74d; }
        .skill-card.level-4::before, .skill-card.level-5::before { background: #ef5350; }

        .skill-icon { font-size: 1.8rem; margin-bottom: 8px; margin-top: 4px; }

        .skill-name {
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .skill-level {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ========== 加载/空状态 ========== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* ========== 页脚 ========== */
        .footer {
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                gap: 8px;
            }
            .nav-links { gap: 16px; }
            .skills-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">Tech<span>Forge</span></a>
        <div class="nav-links">
            <a class="nav-link" href="/">首页</a>
            <a class="nav-link" href="/articles.html">文章</a>
            <a class="nav-link" href="/projects.html">项目</a>
            <a class="nav-link active" href="/skills.html">技能</a>
            <a class="nav-link" href="/#chat">AI 对话</a>
            <a class="nav-link" href="/admin.html">后台</a>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container">
        <div class="page-header">
            <h1 class="page-title">我的<span>技术栈</span></h1>
        </div>
        <div id="skills-tree">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 TechForge · 用技术创造价值</p>
    </footer>

    <script>
        const API_BASE = '';
        const CATEGORY_ICONS = {
            'frontend': '🎨',
            'backend': '⚙️',
            'ai': '🤖',
            'hardware': '🔧',
            'other': '📦'
        };

        const LEVEL_NAMES = {
            1: '入门',
            2: '熟悉',
            3: '掌握',
            4: '精通',
            5: '专家'
        };

        function renderSkillTree(data) {
            const container = document.getElementById('skills-tree');

            if (!data.categories || data.categories.length === 0) {
                container.innerHTML = '<div class="loading">暂无技能数据</div>';
                return;
            }

            container.innerHTML = data.categories.map(cat => `
                <div class="skill-category">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span class="category-icon">${CATEGORY_ICONS[cat.id] || '📦'}</span>
                        <span class="category-title">${cat.name} (${cat.skills.length})</span>
                        <span class="category-toggle">▼</span>
                    </div>
                    <div class="skills-grid">
                        ${cat.skills.map(skill => `
                            <div class="skill-card level-${skill.level}" onclick="showSkillDetail('${skill.name}', ${skill.level})">
                                <div class="skill-icon">🔹</div>
                                <div class="skill-name">${skill.name}</div>
                                <div class="skill-level">${LEVEL_NAMES[skill.level] || '入门'}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleCategory(header) {
            header.classList.toggle('expanded');
            const grid = header.nextElementSibling;
            grid.classList.toggle('show');
        }

        function showSkillDetail(name, level) {
            alert(`${name}\n熟练度: ${LEVEL_NAMES[level]} (${level}/5)`);
        }

        // 加载数据
        fetch(API_BASE + '/api/skills/tree')
            .then(res => res.json())
            .then(result => {
                if (result.code === 200) {
                    renderSkillTree(result.data);
                } else {
                    document.getElementById('skills-tree').innerHTML = '<div class="loading">加载失败</div>';
                }
            })
            .catch(() => {
                document.getElementById('skills-tree').innerHTML = '<div class="loading">加载失败</div>';
            });
    </script>
</body>
</html>
