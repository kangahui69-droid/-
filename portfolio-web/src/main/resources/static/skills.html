<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术栈 - TechForge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }

        /* 导航 */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 1.5rem; font-weight: bold; color: #00d4ff; }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-link { color: #aaa; text-decoration: none; transition: color 0.3s; }
        .nav-link:hover, .nav-link.active { color: #00d4ff; }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { text-align: center; margin-bottom: 2rem; font-size: 2.5rem; }
        h1 span { color: #00d4ff; }

        /* 技能分类 */
        .skill-category { margin-bottom: 2rem; }
        .category-header { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; background: rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; transition: all 0.3s; }
        .category-header:hover { background: rgba(255,255,255,0.15); }
        .category-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .category-title { font-size: 1.3rem; font-weight: 600; flex: 1; }
        .category-toggle { font-size: 1.2rem; transition: transform 0.3s; }
        .category-header.expanded .category-toggle { transform: rotate(180deg); }

        /* 技能网格 */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; padding: 1.5rem; max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, padding 0.4s; }
        .skills-grid.show { max-height: 1000px; padding: 1.5rem; }

        /* 技能卡片 */
        .skill-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .skill-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .skill-card.level-1, .skill-card.level-2 { border-color: #4fc3f7; }
        .skill-card.level-3 { border-color: #ffb74d; }
        .skill-card.level-4, .skill-card.level-5 { border-color: #ef5350; }
        .skill-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .skill-name { font-weight: 500; margin-bottom: 0.3rem; }
        .skill-level { font-size: 0.8rem; opacity: 0.7; }

        /* 加载状态 */
        .loading { text-align: center; padding: 3rem; color: #888; }

        /* 折叠响应式 */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 1rem; }
            .skills-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">TechForge</a>
        <div class="nav-links">
            <a href="/" class="nav-link">首页</a>
            <a href="/articles.html" class="nav-link">文章</a>
            <a href="/projects.html" class="nav-link">项目</a>
            <a href="/skills.html" class="nav-link active">技能</a>
            <a href="/#chat" class="nav-link">AI对话</a>
        </div>
    </nav>

    <div class="container">
        <h1>我的<span>技术栈</span></h1>
        <div id="skills-tree">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const CATEGORY_ICONS = {
            'frontend': '🎨',
            'backend': '⚙️',
            'ai': '🤖',
            'hardware': '🔧',
            'other': '📦'
        };

        const LEVEL_NAMES = {
            1: '入门',
            2: '熟悉',
            3: '掌握',
            4: '精通',
            5: '专家'
        };

        function renderSkillTree(data) {
            const container = document.getElementById('skills-tree');

            if (!data.categories || data.categories.length === 0) {
                container.innerHTML = '<div class="loading">暂无技能数据</div>';
                return;
            }

            container.innerHTML = data.categories.map(cat => `
                <div class="skill-category">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span class="category-icon">${CATEGORY_ICONS[cat.id] || '📦'}</span>
                        <span class="category-title">${cat.name} (${cat.skills.length})</span>
                        <span class="category-toggle">▼</span>
                    </div>
                    <div class="skills-grid">
                        ${cat.skills.map(skill => `
                            <div class="skill-card level-${skill.level}" onclick="showSkillDetail('${skill.name}', ${skill.level})">
                                <div class="skill-icon">🔹</div>
                                <div class="skill-name">${skill.name}</div>
                                <div class="skill-level">${LEVEL_NAMES[skill.level] || '入门'}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleCategory(header) {
            header.classList.toggle('expanded');
            const grid = header.nextElementSibling;
            grid.classList.toggle('show');
        }

        function showSkillDetail(name, level) {
            alert(`${name}\n熟练度: ${LEVEL_NAMES[level]} (${level}/5)`);
        }

        // 加载数据
        fetch(API_BASE + '/api/skills/tree')
            .then(res => res.json())
            .then(result => {
                if (result.code === 200) {
                    renderSkillTree(result.data);
                } else {
                    document.getElementById('skills-tree').innerHTML = '<div class="loading">加载失败</div>';
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('skills-tree').innerHTML = '<div class="loading">加载失败</div>';
            });
    </script>
</body>
</html>
