<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - TechForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== 配色系统 ========== */
        :root {
            --bg-primary: #0b1120;
            --bg-card: #1a2332;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --border: #1e293b;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        /* ========== 导航 ========== */
        .navbar {
            position: sticky;
            top: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: nowrap;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); }

        /* ========== 阅读进度条 ========== */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 3px;
            background: transparent;
            z-index: 99;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            border-radius: 0 2px 2px 0;
            transition: width 0.1s linear;
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ========== 返回按钮 ========== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        /* ========== 文章头部 ========== */
        .article-header {
            margin-bottom: 32px;
        }

        .article-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ========== 文章内容 ========== */
        .article-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px var(--shadow);
            margin-bottom: 48px;
        }

        .article-content p {
            margin-bottom: 16px;
            font-size: 15px;
            line-height: 1.8;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            margin: 24px 0 12px;
            font-weight: 600;
        }

        .article-content h1 { font-size: 22px; }
        .article-content h2 { font-size: 18px; }
        .article-content h3 { font-size: 16px; }

        .article-content code {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .article-content pre {
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid var(--border);
        }

        .article-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        /* ========== 目录（TOC） ========== */
        .toc {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .toc-title {
            font-size: 15px;
            font-weight: 600;
            padding: 14px 18px;
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-primary);
        }

        .toc-title::-webkit-details-marker { display: none; }
        .toc-title::after {
            content: '▸';
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .toc[open] .toc-title::after {
            transform: rotate(90deg);
        }

        .toc-nav {
            padding: 0 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .toc-link {
            display: block;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-muted);
            transition: all 0.15s;
            border-left: 2px solid transparent;
        }

        .toc-link:hover {
            color: var(--text-secondary);
            background: rgba(56, 189, 248, 0.05);
        }

        .toc-link.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(56, 189, 248, 0.08);
            font-weight: 500;
        }

        .toc-link.toc-h1 { padding-left: 10px; font-weight: 600; }
        .toc-link.toc-h2 { padding-left: 20px; }
        .toc-link.toc-h3 { padding-left: 30px; font-size: 12px; }

        /* 桌面端：侧边栏 */
        @media (min-width: 1280px) {
            .toc {
                position: fixed;
                left: calc(50% + 424px);
                top: 100px;
                width: 200px;
                max-height: calc(100vh - 140px);
                overflow-y: auto;
                background: rgba(26, 35, 50, 0.92);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                box-shadow: 0 2px 12px var(--shadow);
                z-index: 50;
            }

            .toc[open] {
                padding-bottom: 8px;
            }

            .toc-title {
                font-size: 14px;
                padding: 12px 14px;
                cursor: default;
            }

            .toc-title::after { display: none; }
            .toc-nav { padding: 0 10px 8px; }
            .toc-link { font-size: 12px; padding: 5px 8px; }
            .toc-link.toc-h2 { padding-left: 16px; }
            .toc-link.toc-h3 { padding-left: 24px; }
        }

        @media (max-width: 1279px) {
            /* 移动端折叠，默认关闭 */
            .toc { margin-top: 0; }
        }

        /* ========== 评论区 ========== */
        .comments-section {
            margin-top: 48px;
        }

        .comments-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            position: relative;
        }

        .comments-title::after {
            content: '';
            display: block;
            width: 32px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            border-radius: 2px;
            margin-top: 8px;
        }

        .comment-form {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .comment-textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            margin-bottom: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .comment-textarea:focus {
            border-color: var(--accent);
        }

        .comment-submit-btn {
            padding: 10px 24px;
            border-radius: 8px;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .comment-submit-btn:hover {
            background: var(--accent-dark);
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .comment-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .comment-author {
            font-size: 14px;
            font-weight: 600;
        }

        .comment-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .comment-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* ========== 页脚 ========== */
        .footer {
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                gap: 8px;
            }
            .article-title {
                font-size: 22px;
            }
            .article-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 阅读进度条 -->
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">Tech<span>Forge</span></a>
        <div class="nav-links">
            <a class="nav-link" href="/">首页</a>
            <a class="nav-link" href="/articles.html">文章</a>
            <a class="nav-link" href="/#projects">项目</a>
            <a class="nav-link" href="/#skills">技能</a>
            <a class="nav-link" href="/#chat">AI 对话</a>
            <a class="nav-link" href="/admin.html">后台</a>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container">
        <a href="/articles.html" class="back-link">← 返回文章列表</a>

        <!-- 目录：桌面端侧边栏 / 移动端折叠 -->
        <details class="toc" id="toc">
            <summary class="toc-title">📑 目录</summary>
            <nav class="toc-nav" id="tocNav"></nav>
        </details>

        <article id="articleContainer">
            <div class="loading">加载中...</div>
        </article>

        <!-- 评论区 -->
        <section class="comments-section">
            <h2 class="comments-title">评论 (<span id="commentCount">0</span>)</h2>

            <!-- 评论表单 -->
            <div class="comment-form">
                <textarea id="commentText" class="comment-textarea" placeholder="发表你的评论..."></textarea>
                <button class="comment-submit-btn" onclick="submitComment()">提交评论</button>
            </div>

            <!-- 评论列表 -->
            <div class="comments-list" id="commentsList">
                <div class="empty-state">暂无评论，快来抢沙发吧</div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 TechForge · 用技术创造价值</p>
    </footer>

    <script>
        // 获取文章ID
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        // 加载文章详情
        async function loadArticle() {
            const container = document.getElementById('articleContainer');

            if (!articleId) {
                container.innerHTML = '<div class="empty-state">文章不存在</div>';
                return;
            }

            try {
                const res = await fetch(`/api/articles/${articleId}`);
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    const article = data.data;
                    renderArticle(article);
                } else {
                    container.innerHTML = '<div class="empty-state">文章不存在</div>';
                }
            } catch (err) {
                console.error('加载文章失败:', err);
                container.innerHTML = '<div class="empty-state">加载失败，请刷新页面重试</div>';
            }
        }

        // 渲染文章
        let headingIndex = 0;
        function renderArticle(article) {
            const container = document.getElementById('articleContainer');
            const title = article.title || '';
            const content = article.content || '';
            const views = article.views || 0;
            const createdAt = formatDate(article.createdAt);

            // 简单处理Markdown内容，标题带 ID
            headingIndex = 0;
            const htmlContent = content
                .replace(/^# (.*$)/gm, (_, text) => `<h1 id="h-${headingIndex++}">${text}</h1>`)
                .replace(/^## (.*$)/gm, (_, text) => `<h2 id="h-${headingIndex++}">${text}</h2>`)
                .replace(/^### (.*$)/gm, (_, text) => `<h3 id="h-${headingIndex++}">${text}</h3>`)
                .replace(/\n\n/g, '</p><p>')
                .replace(/`(.*?)`/g, '<code>$1</code>');

            container.innerHTML = `
                <header class="article-header">
                    <h1 class="article-title">${title}</h1>
                    <div class="article-meta">
                        <span>📅 ${createdAt}</span>
                        <span>👁 ${views} 阅读</span>
                    </div>
                </header>
                <div class="article-content">
                    <p>${htmlContent}</p>
                </div>
            `;

            // 更新页面标题
            document.title = title + ' - TechForge';

            // 生成目录
            buildToc();
        }

        function buildToc() {
            const content = document.querySelector('.article-content');
            if (!content) return;

            const headings = content.querySelectorAll('h1, h2, h3');
            const tocNav = document.getElementById('tocNav');
            const toc = document.getElementById('toc');

            if (headings.length === 0) {
                toc.style.display = 'none';
                return;
            }
            toc.style.display = '';

            let html = '';
            headings.forEach(h => {
                const tag = h.tagName.toLowerCase();
                const cls = 'toc-' + tag;
                html += `<a class="toc-link ${cls}" href="#${h.id}">${h.textContent}</a>`;
            });
            tocNav.innerHTML = html;

            // 桌面端默认展开
            if (window.innerWidth >= 1280) {
                toc.setAttribute('open', '');
            }

            // TOC 链接点击：平滑滚动
            tocNav.querySelectorAll('.toc-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        // 移动端点击后关闭目录
                        if (window.innerWidth < 1200) {
                            toc.removeAttribute('open');
                        }
                    }
                });
            });

            // Scroll spy：高亮当前标题
            setupScrollSpy(headings);
        }

        function setupScrollSpy(headings) {
            const tocLinks = document.querySelectorAll('.toc-link');
            if (headings.length === 0 || tocLinks.length === 0) return;

            const observer = new IntersectionObserver(entries => {
                let activeId = null;
                entries.forEach(e => {
                    if (e.isIntersecting) activeId = e.target.id;
                });

                if (activeId) {
                    tocLinks.forEach(link => {
                        link.classList.toggle('active', link.getAttribute('href') === '#' + activeId);
                    });
                }
            }, {
                rootMargin: '-80px 0px -70% 0px',
                threshold: 0
            });

            headings.forEach(h => observer.observe(h));
        }

        // 提交评论
        async function submitComment() {
            const text = document.getElementById('commentText').value.trim();
            if (!text) {
                alert('请输入评论内容');
                return;
            }

            if (!articleId) {
                alert('文章不存在');
                return;
            }

            try {
                const res = await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articleId: parseInt(articleId),
                        content: text
                    })
                });

                const data = await res.json();
                if (data.code === 0) {
                    document.getElementById('commentText').value = '';
                    alert('评论成功！');
                    loadComments(); // 刷新评论列表
                } else {
                    alert(data.message || '评论失败');
                }
            } catch (err) {
                console.error('提交评论失败:', err);
                alert('评论失败，请稍后重试');
            }
        }

        // 加载评论列表
        async function loadComments() {
            if (!articleId) return;

            const listContainer = document.getElementById('commentsList');
            const countSpan = document.getElementById('commentCount');

            try {
                const res = await fetch(`/api/comments?articleId=${articleId}`);
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    const comments = data.data.list || [];
                    const total = data.data.total || 0;

                    countSpan.textContent = total;

                    if (comments.length === 0) {
                        listContainer.innerHTML = '<div class="empty-state">暂无评论，快来抢沙发吧</div>';
                    } else {
                        listContainer.innerHTML = '';
                        comments.forEach(comment => {
                            const item = document.createElement('div');
                            item.className = 'comment-item';
                            item.innerHTML = `
                                <div class="comment-header">
                                    <span class="comment-author">${comment.author || '访客'}</span>
                                    <span class="comment-time">${formatDate(comment.createdAt)}</span>
                                </div>
                                <div class="comment-content">${comment.content}</div>
                            `;
                            listContainer.appendChild(item);
                        });
                    }
                }
            } catch (err) {
                console.error('加载评论失败:', err);
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // 阅读进度条
        function updateProgressBar() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
        }

        window.addEventListener('scroll', updateProgressBar, { passive: true });

        // 页面加载完成后加载文章和评论
        document.addEventListener('DOMContentLoaded', () => {
            loadArticle();
            loadComments();
        });
    </script>
</body>
</html>
