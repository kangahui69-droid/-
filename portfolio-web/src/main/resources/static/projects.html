<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目列表 - TechForge</title>
    <style>
        :root {
            --bg-primary: #f0f7ff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #06b6d4;
            --accent-dark: #0891b2;
            --border: #e5e5e5;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        .navbar {
            position: sticky;
            top: 0;
            height: 60px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: nowrap;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .section-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .section-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px var(--shadow);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            background: var(--bg-primary);
            color: var(--text-muted);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }

        .page-btn {
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .empty-state, .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .footer {
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                gap: 8px;
            }
            .nav-links {
                gap: 12px;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">Tech<span>Forge</span></a>
        <div class="nav-links">
            <a class="nav-link" href="/">首页</a>
            <a class="nav-link" href="/articles.html">文章</a>
            <a class="nav-link active" href="/projects.html">项目</a>
            <a class="nav-link" href="/#skills">技能</a>
            <a class="nav-link" href="/#chat">AI 对话</a>
            <a class="nav-link" href="/admin.html">后台</a>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container">
        <div class="page-header">
            <h1 class="page-title">全部项目</h1>
            <p class="page-subtitle">共 <span id="totalCount">0</span> 个项目</p>
        </div>

        <div class="card-grid" id="projectsGrid">
            <div class="loading">加载中...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 TechForge · 用技术创造价值</p>
    </footer>

    <script>
        const PAGE_SIZE = 12;
        let currentPage = 1;

        // 加载项目列表
        async function loadProjects(page = 1) {
            currentPage = page;
            const grid = document.getElementById('projectsGrid');
            const pagination = document.getElementById('pagination');

            grid.innerHTML = '<div class="loading">加载中...</div>';
            pagination.innerHTML = '';

            try {
                const res = await fetch('/api/projects');
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    const allProjects = data.data;
                    const total = allProjects.length;
                    const totalPages = Math.ceil(total / PAGE_SIZE);
                    const start = (page - 1) * PAGE_SIZE;
                    const projects = allProjects.slice(start, start + PAGE_SIZE);

                    document.getElementById('totalCount').textContent = total;

                    grid.innerHTML = '';
                    if (projects.length === 0) {
                        grid.innerHTML = '<div class="empty-state">暂无项目</div>';
                    } else {
                        projects.forEach(project => {
                            const card = createProjectCard(project);
                            grid.appendChild(card);
                        });
                    }

                    if (totalPages > 1) {
                        renderPagination(totalPages, page);
                    }
                }
            } catch (err) {
                console.error('加载项目失败:', err);
                grid.innerHTML = '<div class="empty-state">加载失败，请刷新页面重试</div>';
            }
        }

        // 创建项目卡片
        function createProjectCard(project) {
            const card = document.createElement('article');
            card.className = 'section-card';
            card.onclick = () => window.location.href = `/project.html?id=${project.id}`;
            // 优先使用关联技能，否则回退到 techStack
            let tagsHtml = '';
            if (project.skills && project.skills.length > 0) {
                const displaySkills = project.skills.slice(0, 3);
                const extraCount = project.skills.length - 3;
                tagsHtml = displaySkills.map(skill =>
                    `<span class="tag">${skill.name}</span>`
                ).join('') + (extraCount > 0 ? `<span class="tag">+${extraCount}</span>` : '');
            } else if (project.techStack) {
                tagsHtml = project.techStack.split(',').slice(0, 3).map(t => `<span class="tag">${t.trim()}</span>`).join('');
            }
            card.innerHTML = `
                <h3 class="card-title">${project.name}</h3>
                <p class="card-desc">${project.description || ''}</p>
                <div class="card-tags">
                    ${tagsHtml}
                </div>
            `;
            return card;
        }

        // 渲染分页
        function renderPagination(totalPages, currentPage) {
            const pagination = document.getElementById('pagination');

            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'page-btn';
                prevBtn.textContent = '上一页';
                prevBtn.onclick = () => loadProjects(currentPage - 1);
                pagination.appendChild(prevBtn);
            }

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
                btn.textContent = i;
                btn.onclick = () => loadProjects(i);
                pagination.appendChild(btn);
            }

            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn';
                nextBtn.textContent = '下一页';
                nextBtn.onclick = () => loadProjects(currentPage + 1);
                pagination.appendChild(nextBtn);
            }
        }

        document.addEventListener('DOMContentLoaded', () => loadProjects(1));
    </script>
</body>
</html>
