<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - TechForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== 配色系统 ========== */
        :root {
            --bg-primary: #0b1120;
            --bg-card: #1a2332;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --border: #1e293b;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }

        /* ========== 导航 ========== */
        .navbar {
            position: sticky;
            top: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: nowrap;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { color: var(--accent); }

        /* ========== 主容器 ========== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ========== 页面标题 ========== */
        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }

        /* ========== 通用卡片网格 ========== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .section-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .section-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px var(--shadow);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            background: rgba(56, 189, 248, 0.12);
            color: var(--accent);
            font-weight: 500;
        }

        /* ========== 分页 ========== */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }

        .page-btn {
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* ========== 加载中 ========== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* ========== 页脚 ========== */
        .footer {
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                gap: 8px;
            }
            .nav-links {
                gap: 12px;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">Tech<span>Forge</span></a>
        <div class="nav-links">
            <a class="nav-link" href="/">首页</a>
            <a class="nav-link active" href="/articles.html">文章</a>
            <a class="nav-link" href="/#projects">项目</a>
            <a class="nav-link" href="/#skills">技能</a>
            <a class="nav-link" href="/#chat">AI 对话</a>
            <a class="nav-link" href="/admin.html">后台</a>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="container">
        <div class="page-header">
            <h1 class="page-title">全部文章</h1>
            <p class="page-subtitle">共 <span id="totalCount">0</span> 篇文章</p>
        </div>

        <div class="card-grid" id="articlesGrid">
            <div class="loading">加载中...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 TechForge · 用技术创造价值</p>
    </footer>

    <script>
        const PAGE_SIZE = 12;
        let currentPage = 1;

        // 加载文章列表
        async function loadArticles(page = 1) {
            currentPage = page;
            const grid = document.getElementById('articlesGrid');
            const pagination = document.getElementById('pagination');

            grid.innerHTML = '<div class="loading">加载中...</div>';
            pagination.innerHTML = '';

            try {
                const res = await fetch(`/api/articles?page=${page}&size=${PAGE_SIZE}`);
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    const articles = data.data.list || [];
                    const total = data.data.total || 0;
                    const totalPages = Math.ceil(total / PAGE_SIZE);

                    document.getElementById('totalCount').textContent = total;

                    // 清空并渲染文章
                    grid.innerHTML = '';
                    if (articles.length === 0) {
                        grid.innerHTML = '<div class="empty-state">暂无文章</div>';
                    } else {
                        articles.forEach(article => {
                            const card = createArticleCard(article);
                            grid.appendChild(card);
                        });
                    }

                    // 渲染分页
                    if (totalPages > 1) {
                        renderPagination(totalPages, page);
                    }
                }
            } catch (err) {
                console.error('加载文章失败:', err);
                grid.innerHTML = '<div class="empty-state">加载失败，请刷新页面重试</div>';
            }
        }

        // 创建文章卡片
        function createArticleCard(article) {
            const card = document.createElement('article');
            card.className = 'section-card';
            card.onclick = () => window.location.href = `/article.html?id=${article.id}`;
            card.innerHTML = `
                <h3 class="card-title">${article.title}</h3>
                <p class="card-desc">${article.excerpt || ''}</p>
                <div class="card-tags">
                    <span class="tag">${formatDate(article.createdAt)}</span>
                    <span class="tag">${article.views || 0} 阅读</span>
                </div>
            `;
            return card;
        }

        // 渲染分页
        function renderPagination(totalPages, currentPage) {
            const pagination = document.getElementById('pagination');

            // 上一页
            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'page-btn';
                prevBtn.textContent = '上一页';
                prevBtn.onclick = () => loadArticles(currentPage - 1);
                pagination.appendChild(prevBtn);
            }

            // 页码
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
                btn.textContent = i;
                btn.onclick = () => loadArticles(i);
                pagination.appendChild(btn);
            }

            // 下一页
            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn';
                nextBtn.textContent = '下一页';
                nextBtn.onclick = () => loadArticles(currentPage + 1);
                pagination.appendChild(nextBtn);
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 页面加载完成后加载文章
        document.addEventListener('DOMContentLoaded', () => loadArticles(1));
    </script>
</body>
</html>
