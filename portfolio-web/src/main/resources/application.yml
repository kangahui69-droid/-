server:
  port: 8080

spring:
  application:
    name: techforge-backend

  datasource:
    url: jdbc:mysql://localhost:3306/techforge?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000  # 24小时

# AI 配置
minimax:
  api-key: ${MINIMAX_API_KEY:}
  api-url: ${MINIMAX_API_URL:https://api.minimax.chat/v1/chat/completions}
  model: ${MINIMAX_MODEL:MiniMax-M2.5}

# 自定义配置（避免与环境变量冲突）
ai:
  minimax:
    key: ${minimax.api-key:}

# CORS 配置
cors:
  allowed-origins: http://localhost:*
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 文件上传
file:
  upload-dir: ./uploads

logging:
  level:
    com.techforge: DEBUG
    org.springframework.security: INFO