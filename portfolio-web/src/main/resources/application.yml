server:
  port: 8080

spring:
  application:
    name: techforge-backend

  datasource:
    url: jdbc:mysql://localhost:3306/techforge?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:kang2005.}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
jwt:
  secret: ${JWT_SECRET:TechForge-Secret-Key-Must-Be-At-Least-256-Bits-Long-For-HS256}
  expiration: 86400000  # 24小时

# AI 配置
minimax:
  api-key: sk-cp-wy-KDQ6ZqtPFVKEI9LQS_0V_IZMRyHnEYMGXNRYe3_ehayrH0V2FpoFVH7060DgF2eaCTRvV5L_p_uwD5JQ8iG3ROsPM0LzOJodJjnwGAK2DnSnZWZAkagY
  api-url: ${MINIMAX_API_URL:https://api.minimax.chat/v1/chat/completions}
  model: ${MINIMAX_MODEL:MiniMax-M2.5}

# 自定义配置（避免与环境变量冲突）
ai:
  minimax:
    key: ${minimax.api-key:}

# CORS 配置
cors:
  allowed-origins: http://localhost:*
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 文件上传
file:
  upload-dir: ./uploads

logging:
  level:
    com.techforge: DEBUG
    org.springframework.security: INFO